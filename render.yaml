services:
  - type: web
    name: iaca-backend
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r backend/requirements-prod.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: IACA API
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        value: sqlite:///./data/iaca.db
      - key: OLLAMA_HOST
        value: ""
      - key: API_AUTH_TOKEN
        sync: false
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_REQUESTS
        value: "60"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: CORS_ORIGINS
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.8"
    disk:
      name: iaca-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
